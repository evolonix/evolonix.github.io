<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a14" />
      <stop offset="1" stop-color="#0e0820" />
    </linearGradient>

    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.55" />
      <stop offset="1" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-magenta" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d946ef" stop-opacity="0.45" />
      <stop offset="1" stop-color="#d946ef" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.5" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1280" height="640" fill="url(#bg)" />

  <!-- Atmospheric glows -->
  <circle cx="200" cy="120" r="380" fill="url(#glow-purple)" />
  <circle cx="1080" cy="540" r="420" fill="url(#glow-cyan)" />
  <circle cx="700" cy="320" r="320" fill="url(#glow-magenta)" />

  <!-- Faint grid texture (subtle structure) -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160" />
    <line x1="0" y1="320" x2="1280" y2="320" />
    <line x1="0" y1="480" x2="1280" y2="480" />
    <line x1="320" y1="0" x2="320" y2="640" />
    <line x1="640" y1="0" x2="640" y2="640" />
    <line x1="960" y1="0" x2="960" y2="640" />
  </g>

  <!-- Brand mark + wordmark — paired as on the About page (logo at 1em, gap, Evolonix in Manrope) -->
  <g transform="translate(230, 200)">
    <!-- Logo: source viewBox 64×64, scaled 2.5× to 160×160 -->
    <g transform="scale(2.5)">
      <rect y="0" width="64" height="12.4" rx="6.2" fill="#a855f7" />
      <rect y="25.8" width="44" height="12.4" rx="6.2" fill="#d946ef" />
      <rect y="51.6" width="64" height="12.4" rx="6.2" fill="#22d3ee" />
    </g>

    <!-- Wordmark: cap-height optically centered with logo -->
    <text x="196" y="138"
      font-family="Manrope, 'SF Pro Display', Helvetica, Arial, sans-serif"
      font-weight="700" font-size="160" letter-spacing="-4" fill="#ffffff">Evolonix</text>
  </g>

  <!-- Tagline -->
  <text x="640" y="460" text-anchor="middle"
    font-family="Manrope, 'SF Pro Display', Helvetica, Arial, sans-serif"
    font-weight="500" font-size="38" letter-spacing="-1" fill="#cbd5e1">Quietly powerful tools for React teams.</text>

  <!-- Categories -->
  <text x="640" y="524" text-anchor="middle"
    font-family="Manrope, 'SF Pro Display', Helvetica, Arial, sans-serif"
    font-weight="500" font-size="22" letter-spacing="3" fill="#94a3b8">PRODUCT ENGINEERING  ·  PLATFORM &amp; DX  ·  DESIGN SYSTEMS  ·  OPEN SOURCE</text>
</svg>
