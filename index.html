    <!-- Standalone (installed PWA) splash bridge: iOS dismisses its native
         apple-touch-startup-image on first paint — well before React is ready —
         which would otherwise flash a blank screen. We detect standalone mode
         before the body paints and show an HTML overlay that mirrors the native
         splash; src/main.tsx fades it out once the app has mounted. The detection
         runs here (not in the bundle) so the overlay is visible from first paint. -->
    <script>
      (function () {
        try {
          var standalone =
            window.matchMedia("(display-mode: standalone)").matches ||
            window.navigator.standalone === true;
          if (standalone)
            document.documentElement.setAttribute("data-standalone", "true");
        } catch (e) {
          /* not standalone */
        }
      })();
    </script>

      }
      [data-standalone="true"] #splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 9vmin;
        background-color: #0b0b12;
        background-image:
          radial-gradient(

            transparent 45%

          linear-gradient(135deg, #0a0a14, #0e0820);
        opacity: 1;
        transition: opacity 400ms ease;
      }
      [data-standalone="true"] #splash.splash--hidden {
        opacity: 0;
      }
      #splash svg {

        height: auto;

        font-weight: 700;
        font-size: min(13vmin, 88px);
        line-height: 1;
        color: #ffffff;
      }
    </style>

    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
