    <!-- Standalone (installed PWA) splash bridge: iOS dismisses its native
         apple-touch-startup-image on first paint — well before React is ready —
         which would otherwise flash a blank screen. We detect standalone mode
         before the body paints and show an HTML overlay that mirrors the native
         splash; src/main.tsx fades it out once the app has mounted. The detection
         runs here (not in the bundle) so the overlay is visible from first paint. -->
    <script>
      (function () {
        try {
          var standalone =
            window.matchMedia("(display-mode: standalone)").matches ||
            window.navigator.standalone === true;
          if (standalone)
            document.documentElement.setAttribute("data-standalone", "true");
        } catch (e) {
          /* not standalone */
        }
      })();
    </script>

      [data-standalone="true"] #splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 9vmin;
        background-color: #0b0b12;
        background-image:
          radial-gradient(
            circle at 12% 14%,
            rgba(168, 85, 247, 0.4),
            transparent 50%
          ),
          radial-gradient(
            circle at 88% 86%,
            rgba(34, 211, 238, 0.38),
            transparent 50%
          ),
          radial-gradient(
            circle at 50% 42%,
            rgba(217, 70, 239, 0.22),
            transparent 45%
          ),
          linear-gradient(135deg, #0a0a14, #0e0820);
        opacity: 1;
        transition: opacity 400ms ease;
      }
      [data-standalone="true"] #splash.splash--hidden {
        opacity: 0;
      }
      /* Sizes mirror scripts/generate-splash.mjs exactly so the overlay lines up
         with the native launch image: logo = 0.2·min(vw,vh), gap = 0.09·, and the
         wordmark's glyph box = 0.75·fontSize = 0.75·0.13· = 0.0975·. The wordmark is
         an outlined path (not text) so there's no line-box padding to shift it. */
      #splash .splash__logo {
        width: 20vmin;
        height: 20vmin;
      }
      #splash .splash__wordmark {
        height: 9.75vmin;
        width: auto;
      }
    </style>

    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
